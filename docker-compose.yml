services:
  app:
    build: .
    container_name: piano-teacher
    restart: unless-stopped
    ports:
      - "14387:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - AUTH_SECRET=${AUTH_SECRET:?required}
      - BACKUP_SECRET=${BACKUP_SECRET:?required}
    # 启动时自动同步数据库
    command: sh -c "cd /app && npx prisma db push --skip-generate && node server.js"

  backup:
    image: curlimages/curl:latest
    container_name: piano-teacher-backup
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./backups:/backups
    environment:
      - BACKUP_SECRET=${BACKUP_SECRET:?required}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          sleep 3600
          HOUR=$$(date +%H)
          if [ "$$HOUR" = "02" ]; then
            DATE=$$(date +%Y-%m-%d)
            curl -s -H "Authorization: Bearer $$BACKUP_SECRET" "http://app:3000/api/backup" -o /backups/backup-$$DATE.json
            echo "Backup completed at $$(date)"
          fi
        done
